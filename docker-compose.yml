services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-trading_db}
      POSTGRES_USER: ${DB_USER:-trading_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading_user} -d ${DB_NAME:-trading_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Applies DB migrations once before web/celery start (every `docker compose up`).
  migrate:
    build: .
    command: >
      bash -c "python manage.py migrate --noinput &&
      python manage.py bootstrap_market_schedules"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 algo_trading_backend.asgi:application
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A algo_trading_backend worker --loglevel=info
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      web:
        condition: service_started
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A algo_trading_backend beat --loglevel=info
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
